<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultKey — Gerenciamento de Keys</title>
<style>
:root{
  --bg:#0a0606;
  --bg-panel:#140a0a;
  --bg-panel-2:#1c0e0e;
  --line:#2e1316;
  --line-soft:#1f0f11;
  --text:#f2e7e8;
  --text-dim:#a38c8e;
  --text-faint:#705a5c;
  --accent:#ff2d3d;
  --accent-dim:#8f1f28;
  --accent-glow:rgba(255,45,61,0.18);
  --danger:#ff5c6c;
  --danger-dim:#3a1a1f;
  --warn:#ffb347;
  --mono:'JetBrains Mono','Consolas',monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% 0%, rgba(255,45,61,0.07), transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(255,45,61,0.05), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  padding:32px 20px 80px;
}
.wrap{max-width:1180px;margin:0 auto;}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:38px;height:38px;border-radius:9px;
  background:linear-gradient(145deg,var(--accent),var(--accent-dim));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;color:#04130a;font-size:18px;
  box-shadow:0 0 24px var(--accent-glow);
}
.brand h1{font-size:18px;font-weight:700;letter-spacing:0.2px;}
.brand span{display:block;font-size:11.5px;color:var(--text-faint);font-family:var(--mono);letter-spacing:0.5px;margin-top:1px;}

.stat-strip{display:flex;gap:10px;flex-wrap:wrap;}
.stat-chip{
  background:var(--bg-panel);border:1px solid var(--line);
  border-radius:10px;padding:8px 14px;text-align:right;min-width:84px;
}
.stat-chip b{display:block;font-family:var(--mono);font-size:17px;color:var(--accent);}
.stat-chip small{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.6px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--bg-panel);padding:5px;border-radius:12px;border:1px solid var(--line);width:fit-content;}
.tab-btn{
  font-family:var(--mono);font-size:13px;letter-spacing:0.3px;
  padding:10px 20px;border:none;background:transparent;color:var(--text-dim);
  border-radius:8px;cursor:pointer;transition:all .15s ease;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--accent);color:#04130a;font-weight:700;}

.panel{display:none;}
.panel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* Generate card */
.card{
  background:var(--bg-panel);border:1px solid var(--line);
  border-radius:14px;padding:22px;margin-bottom:24px;
}
.card h2{font-size:14px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card h2::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;}

.gen-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;}
select,input{
  background:var(--bg-panel-2);border:1px solid var(--line);color:var(--text);
  padding:10px 12px;border-radius:8px;font-family:var(--sans);font-size:13.5px;outline:none;
  transition:border-color .15s;
}
select:focus,input:focus{border-color:var(--accent-dim);}
input[type=number]{width:90px;}
input[type=text]{width:170px;}
.btn{
  font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:0.3px;
  padding:11px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s ease;
}
.btn-primary{background:var(--accent);color:#04130a;}
.btn-primary:hover{box-shadow:0 0 18px var(--accent-glow);transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim);}
.btn-ghost:hover{border-color:var(--accent-dim);color:var(--text);}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid #5a2530;}
.btn-danger:hover{background:#4a1f26;}
.btn-small{padding:6px 12px;font-size:11px;border-radius:6px;}

/* Categories grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}
.cat-card{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;
  overflow:hidden;
}
.cat-head{
  padding:14px 18px;display:flex;align-items:center;justify-content:between;justify-content:space-between;
  border-bottom:1px solid var(--line-soft);
}
.cat-head .name{display:flex;align-items:center;gap:10px;}
.cat-dot{width:9px;height:9px;border-radius:50%;}
.cat-title{font-weight:700;font-size:14px;}
.cat-count{font-family:var(--mono);font-size:12px;color:var(--text-faint);background:var(--bg-panel-2);padding:3px 9px;border-radius:20px;}

.key-list{max-height:260px;overflow-y:auto;}
.key-list::-webkit-scrollbar{width:6px;}
.key-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.key-row{
  padding:11px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line-soft);gap:10px;
}
.key-row:last-child{border-bottom:none;}
.key-code{font-family:var(--mono);font-size:12.5px;color:var(--text);letter-spacing:0.3px;}
.key-meta{font-size:10.5px;color:var(--text-faint);margin-top:2px;}
.key-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--bg-panel-2);
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all .15s;
}
.icon-btn:hover{border-color:var(--accent-dim);color:var(--accent);}
.icon-btn.danger:hover{border-color:var(--danger);color:var(--danger);}
.empty{padding:28px 18px;text-align:center;color:var(--text-faint);font-size:12.5px;font-family:var(--mono);}

/* Active keys table */
.table-wrap{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-faint);
  padding:13px 16px;border-bottom:1px solid var(--line);background:var(--bg-panel-2);
}
td{padding:13px 16px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.badge{
  font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;
  display:inline-block;
}
.hwid-val{font-family:var(--mono);font-size:12px;color:var(--text-dim);}
.hwid-empty{color:var(--text-faint);font-style:italic;font-size:12px;}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(5,7,10,0.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:24px;
  width:100%;max-width:380px;
}
.modal h3{font-size:15px;margin-bottom:14px;}
.modal .field{margin-bottom:14px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg-panel);border:1px solid var(--accent-dim);color:var(--accent);
  padding:11px 22px;border-radius:10px;font-family:var(--mono);font-size:12.5px;
  opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{margin-top:36px;text-align:center;color:var(--text-faint);font-size:11px;font-family:var(--mono);}

/* Login Screen */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,45,61,0.08), transparent 50%),
    var(--bg);
  padding:20px;
}
.login-box{
  width:100%;max-width:340px;background:var(--bg-panel);border:1px solid var(--line);
  border-radius:16px;padding:32px 28px;text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.5);
}
.login-box h2{
  font-family:var(--mono);font-size:20px;letter-spacing:4px;font-weight:700;margin-top:4px;
}
.login-box p{font-size:12px;color:var(--text-faint);margin-top:6px;margin-bottom:26px;font-family:var(--mono);letter-spacing:0.3px;}
.login-box .field{text-align:left;margin-bottom:16px;}
.login-box input{width:100%;}
.login-error{
  display:none;color:var(--accent);font-size:11.5px;font-family:var(--mono);
  background:var(--danger-dim);border:1px solid #5a2530;border-radius:8px;
  padding:8px 10px;margin-bottom:14px;
}
.login-error.show{display:block;}
@media(max-width:640px){
  .gen-row{flex-direction:column;align-items:stretch;}
  input[type=text]{width:100%;}
  table{font-size:11px;}
  th,td{padding:10px 8px;}
}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="brand-mark" style="margin:0 auto 18px;">⌁</div>
    <h2>KEY AUTH</h2>
    <p>Gerenciador de Licenças</p>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="usuário" autocomplete="off">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="senha" autocomplete="off">
    </div>
    <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:6px;">ENTRAR</button>
  </div>
</div>

<div class="wrap" id="mainApp" style="display:none;">

  <header>
    <div class="brand">
      <div class="brand-mark">⌁</div>
      <div>
        <h1>VaultKey</h1>
        <span>SISTEMA DE LICENCIAMENTO</span>
      </div>
    </div>
    <div class="stat-strip" id="statStrip"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="manage">📋 Gerenciamento</button>
    <button class="tab-btn" data-tab="active">🟢 Keys Ativas</button>
  </div>

  <!-- ===== PAINEL: GERENCIAMENTO ===== -->
  <div class="panel active" id="panel-manage">

    <div class="card">
      <h2>Gerar Nova Key</h2>
      <div class="gen-row">
        <div class="field">
          <label>Categoria</label>
          <select id="genCategory">
            <option value="diaria">Diária</option>
            <option value="semanal">Semanal</option>
            <option value="mensal">Mensal</option>
            <option value="trimestral">Trimestral</option>
            <option value="anual">Anual</option>
            <option value="permanente">Permanente</option>
          </select>
        </div>
        <div class="field">
          <label>Quantidade</label>
          <input type="number" id="genQty" value="1" min="1" max="50">
        </div>
        <div class="field">
          <label>Nota (opcional)</label>
          <input type="text" id="genNote" placeholder="ex: cliente VIP">
        </div>
        <button class="btn btn-primary" id="genBtn">+ Gerar Key(s)</button>
      </div>
    </div>

    <div class="card" style="padding-bottom:8px;">
      <h2>Reset de HWID</h2>
      <div class="gen-row">
        <div class="field" style="flex:1;min-width:220px;">
          <label>Código da Key</label>
          <input type="text" id="resetKeyInput" placeholder="Cole a key ativa aqui" style="width:100%;font-family:var(--mono);">
        </div>
        <button class="btn btn-ghost" id="resetHwidBtn">↺ Resetar HWID</button>
      </div>
    </div>

    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- ===== PAINEL: KEYS ATIVAS ===== -->
  <div class="panel" id="panel-active">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th><th>Categoria</th><th>HWID</th><th>Ativada em</th><th>Expira em</th><th>Status</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="activeTableBody"></tbody>
      </table>
    </div>
  </div>

  <footer>VaultKey · gerenciamento local de licenças · dados salvos automaticamente</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Login ---------- */
const VALID_USER = 'Shark10';
const VALID_PASS = '10';
const ADMIN_KEY = 'Shark10-10'; // precisa bater com ADMIN_KEY do server.js

function attemptLogin(){
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errBox = document.getElementById('loginError');
  if(user === VALID_USER && pass === VALID_PASS){
    errBox.classList.remove('show');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    load();
  }else{
    errBox.classList.add('show');
  }
}
document.getElementById('loginBtn').addEventListener('click', attemptLogin);
document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });

function apiHeaders(){
  return { 'Content-Type':'application/json', 'x-admin-key': ADMIN_KEY };
}

const CATS = [
  {id:'diaria',     label:'Diária',     dot:'#ff2d3d', days:1},
  {id:'semanal',    label:'Semanal',    dot:'#ff5c4d', days:7},
  {id:'mensal',     label:'Mensal',     dot:'#ff7a45', days:30},
  {id:'trimestral', label:'Trimestral', dot:'#e0383f', days:90},
  {id:'anual',      label:'Anual',      dot:'#b8232f', days:365},
  {id:'permanente', label:'Permanente', dot:'#8f1f28', days:null},
];

let keys = []; // {code, category, note, createdAt, status:'pending'|'active', hwid, activatedAt, expiresAt}

function uid(n){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<n;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function genCode(catId){
  const prefix = catId.slice(0,3).toUpperCase();
  return `${prefix}-${uid(4)}-${uid(4)}-${uid(4)}`;
}
function fmtDate(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function catInfo(id){ return CATS.find(c=>c.id===id); }

async function load(){
  try{
    const r = await fetch('/api/keys', { headers: apiHeaders() });
    const data = await r.json();
    keys = data.success ? data.keys : [];
  }catch(e){
    console.error('Erro ao carregar', e);
    keys = [];
  }
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function copyText(text){
  navigator.clipboard?.writeText(text).then(()=>showToast('Key copiada: '+text)).catch(()=>showToast('Não foi possível copiar'));
}

/* ---------- Render ---------- */
function render(){
  renderStats();
  renderCatGrid();
  renderActiveTable();
}

function renderStats(){
  const total = keys.length;
  const active = keys.filter(k=>k.status==='active').length;
  const pending = total - active;
  const strip = document.getElementById('statStrip');
  strip.innerHTML = `
    <div class="stat-chip"><b>${total}</b><small>Total</small></div>
    <div class="stat-chip"><b>${active}</b><small>Ativas</small></div>
    <div class="stat-chip"><b>${pending}</b><small>Pendentes</small></div>
  `;
}

function renderCatGrid(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATS.forEach(cat=>{
    const list = keys.filter(k=>k.category===cat.id && k.status==='pending');
    const card = document.createElement('div');
    card.className='cat-card';
    card.innerHTML = `
      <div class="cat-head">
        <div class="name">
          <span class="cat-dot" style="background:${cat.dot}"></span>
          <span class="cat-title">${cat.label}</span>
        </div>
        <span class="cat-count">${list.length}</span>
      </div>
      <div class="key-list">
        ${list.length===0 ? `<div class="empty">Nenhuma key pendente</div>` :
          list.map(k=>`
            <div class="key-row">
              <div>
                <div class="key-code">${k.code}</div>
                <div class="key-meta">${k.note ? k.note+' · ' : ''}gerada em ${fmtDate(k.createdAt)}</div>
              </div>
              <div class="key-actions">
                <button class="icon-btn" title="Copiar" onclick="copyText('${k.code}')">⧉</button>
                <button class="icon-btn danger" title="Excluir" onclick="deleteKey('${k.code}')">✕</button>
              </div>
            </div>
          `).join('')
        }
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderActiveTable(){
  const body = document.getElementById('activeTableBody');
  const active = keys.filter(k=>k.status==='active');
  if(active.length===0){
    body.innerHTML = `<tr><td colspan="7" class="empty">Nenhuma key ativa no momento</td></tr>`;
    return;
  }
  body.innerHTML = active.map(k=>{
    const cat = catInfo(k.category);
    const expired = k.expiresAt && Date.now() > k.expiresAt;
    return `
      <tr>
        <td class="key-code">${k.code}</td>
        <td><span class="badge" style="background:${cat.dot}22;color:${cat.dot};border:1px solid ${cat.dot}55;">${cat.label}</span></td>
        <td>${k.hwid ? `<span class="hwid-val">${k.hwid}</span>` : `<span class="hwid-empty">não vinculado</span>`}</td>
        <td>${fmtDate(k.activatedAt)}</td>
        <td>${k.expiresAt ? fmtDate(k.expiresAt) : '<span style="color:var(--text-faint)">nunca</span>'}</td>
        <td><span class="badge" style="background:${expired ? '#3a1a1f' : '#8f1f2833'};color:${expired ? '#ff5c6c' : '#ff2d3d'};border:1px solid ${expired ? '#5a2530' : '#8f1f2880'};">${expired ? 'Expirada' : 'Válida'}</span></td>
        <td>
          <div class="key-actions">
            <button class="icon-btn" title="Copiar" onclick="copyText('${k.code}')">⧉</button>
            <button class="icon-btn" title="Resetar HWID" onclick="resetHwid('${k.code}')">↺</button>
            <button class="icon-btn danger" title="Revogar" onclick="deleteKey('${k.code}')">✕</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

/* ---------- Ações ---------- */
document.getElementById('genBtn').addEventListener('click', async ()=>{
  const cat = document.getElementById('genCategory').value;
  const qty = Math.min(50, Math.max(1, parseInt(document.getElementById('genQty').value)||1));
  const note = document.getElementById('genNote').value.trim();
  try{
    const r = await fetch('/api/keys/generate', {
      method:'POST', headers: apiHeaders(),
      body: JSON.stringify({category:cat, qty, note})
    });
    const data = await r.json();
    if(!data.success){ showToast('Erro ao gerar key'); return; }
    document.getElementById('genNote').value='';
    await load();
    showToast(`${qty} key(s) gerada(s) — ${catInfo(cat).label}`);
  }catch(e){ showToast('Erro de conexão com o servidor'); }
});

async function deleteKey(code){
  try{
    await fetch('/api/keys/'+encodeURIComponent(code), { method:'DELETE', headers: apiHeaders() });
    await load();
    showToast('Key removida');
  }catch(e){ showToast('Erro de conexão com o servidor'); }
}

async function resetHwid(code){
  try{
    const r = await fetch('/api/keys/'+encodeURIComponent(code)+'/reset-hwid', { method:'POST', headers: apiHeaders() });
    const data = await r.json();
    if(!data.success){ showToast('Erro ao resetar HWID'); return; }
    await load();
    showToast('HWID resetado para '+code);
  }catch(e){ showToast('Erro de conexão com o servidor'); }
}

document.getElementById('resetHwidBtn').addEventListener('click', async ()=>{
  const code = document.getElementById('resetKeyInput').value.trim().toUpperCase();
  if(!code){ showToast('Cole o código da key'); return; }
  const k = keys.find(x=>x.code===code);
  if(!k){ showToast('Key não encontrada'); return; }
  if(k.status!=='active'){ showToast('Essa key ainda não está ativa'); return; }
  await resetHwid(code);
  document.getElementById('resetKeyInput').value='';
});

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

// load() agora só é chamado após login bem-sucedido (ver attemptLogin)
</script>
</body>
</html>
